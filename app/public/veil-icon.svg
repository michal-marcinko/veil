<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Veil invoice logo mark</title>
  <desc id="desc">Dev-friendly SVG logo with separate page, hidden content, visible content, fold, and veil groups.</desc>

  <defs>
    <linearGradient id="pageFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffaf0"/>
      <stop offset="1" stop-color="#f5f0e6"/>
    </linearGradient>

    <!-- Keep the veil visually soft, but fully opaque so content beneath is hidden. -->
    <linearGradient id="veilFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbf6ec"/>
      <stop offset="0.55" stop-color="#f3ede2"/>
      <stop offset="1" stop-color="#f9f4ea"/>
    </linearGradient>

    <linearGradient id="foldFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a2823"/>
      <stop offset="1" stop-color="#11100e"/>
    </linearGradient>

    <filter id="softShadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="3" stdDeviation="2.2" flood-color="#1A1814" flood-opacity="0.16"/>
    </filter>

    <clipPath id="pageClip">
      <path d="M138 83 H380 V358 L334 410 H138 Z"/>
    </clipPath>

    <style>
      :root {
        --ink: #1A1814;
      }

      .stroke-main {
        stroke: var(--ink);
        stroke-width: 6.5;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }

      .stroke-detail {
        stroke: var(--ink);
        stroke-width: 5.2;
        stroke-linecap: round;
        fill: none;
      }

      .stroke-detail-small {
        stroke: var(--ink);
        stroke-width: 4.4;
        stroke-linecap: round;
        fill: none;
      }

      .stroke-micro {
        stroke: var(--ink);
        stroke-width: 3.4;
        stroke-linecap: round;
        fill: none;
        opacity: 0.88;
      }

      .fill-ink {
        fill: var(--ink);
      }

      /*
        Brand moment — cinematic version: on every render of the SVG,
        the page + invoice content paint first, hold for a quarter-second
        so the eye registers what's there, then the veil descends slowly
        from a thin sliver at the top edge to its full covering position
        over ~1.1s. The exposure-then-conceal arc IS the privacy story,
        and the longer duration + ease-out-expo curve let the moment
        breathe instead of flash by.
      */
      @keyframes veil-descend {
        0% {
          transform: scaleY(0);
          opacity: 0;
        }
        18% {
          opacity: 1;
        }
        100% {
          transform: scaleY(1);
          opacity: 1;
        }
      }

      .veil-animate {
        transform-box: fill-box;
        transform-origin: 50% 0%;
        /* 280ms hold (content stays exposed) → 1100ms slow descent.
           ease-out-expo is the most cinematic of the standard curves —
           lingers at the end like a curtain settling. */
        animation: veil-descend 1100ms cubic-bezier(0.19, 1, 0.22, 1) 280ms both;
      }

      @media (prefers-reduced-motion: reduce) {
        .veil-animate {
          animation: none !important;
        }
      }
    </style>
  </defs>

  <g id="logo-root">
    <!-- PAGE BASE -->
    <g id="page" filter="url(#softShadow)">
      <path id="page-fill" d="M138 83 H380 V358 L334 410 H138 Z" fill="url(#pageFill)"/>

      <!-- Only draw the page outline where the page is not covered by the veil. -->
      <path id="page-outline-left-lower" d="M138 280 V410" class="stroke-main"/>
      <path id="page-outline-bottom" d="M138 410 H334" class="stroke-main"/>
      <path id="page-outline-right-lower" d="M380 257 V358" class="stroke-main"/>
    </g>

    <!-- CONTENT CLIPPED TO PAGE -->
    <g id="page-content" clip-path="url(#pageClip)">
      <!-- Hidden by veil -->
      <g id="hidden-content">
        <path d="M166 126 H250" class="stroke-micro"/>
        <path d="M166 144 H227" class="stroke-micro"/>
        <path d="M296 126 H345" class="stroke-micro"/>
        <path d="M296 144 H330" class="stroke-micro"/>

        <path d="M166 177 H345" class="stroke-micro"/>
        <path d="M166 194 H333" class="stroke-micro"/>
        <path d="M166 211 H342" class="stroke-micro"/>
        <path d="M166 228 H306" class="stroke-micro"/>

        <circle cx="172" cy="249" r="3.1" class="fill-ink" opacity="0.88"/>
        <path d="M184 249 H258" class="stroke-micro"/>
        <circle cx="272" cy="249" r="3.1" class="fill-ink" opacity="0.88"/>
        <path d="M284 249 H338" class="stroke-micro"/>
      </g>

      <!-- Always visible lower content -->
      <g id="visible-content">
        <path d="M161 297 H213" class="stroke-detail"/>
        <path d="M161 317 H219" class="stroke-detail"/>
        <path d="M161 338 H206" class="stroke-detail"/>

        <circle cx="286" cy="295" r="6.2" class="fill-ink"/>
        <path d="M304 295 H349" class="stroke-detail-small"/>
        <circle cx="286" cy="317" r="6.2" class="fill-ink"/>
        <path d="M304 317 H352" class="stroke-detail-small"/>
        <circle cx="286" cy="339" r="6.2" class="fill-ink"/>
        <path d="M304 339 H351" class="stroke-detail-small"/>
      </g>
    </g>

    <!-- FOLD -->
    <g id="fold">
      <path id="fold-fill" d="M334 410 L380 358 V410 Z" fill="url(#foldFill)"/>
      <path id="fold-edge" d="M334 410 L380 358" class="stroke-main"/>
    </g>

    <!-- VEIL -->
    <g id="veil" class="veil-animate">
      <path id="veil-shadow"
            d="M138 279 C178 294 224 280 270 263 C318 245 359 236 392 240"
            stroke="#1A1814" stroke-width="11" stroke-linecap="round" fill="none" opacity="0.13"/>

      <path id="veil-body"
            d="M138 83 H378
               C376 133 372 177 391 220
               C396 232 404 240 410 245
               C400 245 393 250 388 257
               C348 239 305 246 262 264
               C216 283 173 291 138 280 Z"
            fill="url(#veilFill)"
            stroke="#1A1814"
            stroke-width="6.5"
            stroke-linecap="round"
            stroke-linejoin="round"/>

      <path id="veil-inner-fold"
            d="M372 92 C358 160 324 219 265 253 C222 277 176 286 140 280"
            stroke="#1A1814" stroke-width="2.2" stroke-linecap="round" fill="none" opacity="0.10"/>

      <path id="veil-front-edge"
            d="M138 280 C178 294 224 280 270 263 C318 245 359 236 392 240"
            stroke="#1A1814" stroke-width="6.8" stroke-linecap="round" fill="none"/>

      <path id="veil-curl"
            d="M392 240 C403 238 409 242 410 245 C401 248 394 251 388 257"
            stroke="#1A1814" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
  </g>
</svg>
