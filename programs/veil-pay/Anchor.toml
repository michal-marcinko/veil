[toolchain]
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

[programs.localnet]
veil_pay = "E2G6dN7yY8VQ2dFRgkvqskdAnPhJXkdorYP6BhKvfa8m"
# Note: programs/mock-umbra is intentionally NOT registered here. It is a
# test-only crate built as a Rust workspace member but installed at runtime by
# tests/run.cjs via surfpool's surfnet_setAccount cheatcode. Listing it under
# [programs.localnet] would force anchor's IDL build to find an IDL it does
# not produce (raw solana-program entrypoint, no #[program] macro).

[programs.devnet]
veil_pay = "E2G6dN7yY8VQ2dFRgkvqskdAnPhJXkdorYP6BhKvfa8m"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "devnet"
wallet = '~\.config\solana\id.json'

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 \"tests/**/*.ts\""

[hooks]
